version: 2

sources:
  - name: postgres_raw  # dbt name
    database: statistic_db
    schema: postgres_raw      # Source of the raw tables
    tables:
      - name: payment_card
        description: "Raw data from payments made by credit card"
      - name: payment_pix
        description: "Raw data from payments made by pix or money transfer"
      - name: nissan_kicks_consumption
        description: "Raw data from car consumption"
      - name: stock_movements
        description: "Raw data from stock and investiments transactions" 
      - name: income
        description: "Raw data from income"
